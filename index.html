<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4d65ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Personal text-to-speech reader using Google Cloud TTS">
  <title>Read To Me</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <div class="app-container">

    <!-- Error Banner -->
    <div id="error-banner" class="error-banner" role="alert"></div>

    <!-- ===== SETUP VIEW ===== -->
    <section id="view-setup" class="view">
      <div class="setup-hero">
        <h2>Read To Me</h2>
        <p>Personal text-to-speech powered by Google Cloud TTS</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="setup-api-key">Google Cloud API Key</label>
        <input type="password" id="setup-api-key" class="form-input"
               placeholder="Enter your API key" autocomplete="off">
      </div>

      <p class="setup-note">
        Your key is stored locally and only sent to Google's TTS API.
        <a href="https://console.cloud.google.com/apis/credentials"
           target="_blank" rel="noopener">Get an API key</a>
      </p>

      <button id="btn-setup-save" class="btn btn-primary">Save &amp; Start</button>
    </section>

    <!-- ===== MAIN VIEW ===== -->
    <section id="view-main" class="view">
      <header class="header">
        <h1>Read To Me</h1>
        <button id="btn-settings" class="btn-icon" title="Settings" aria-label="Settings">&#9881;</button>
      </header>

      <div class="form-group text-container">
        <button id="btn-expand" class="btn-expand" title="Expand text area" aria-label="Expand text area">&#8597;</button>
        <textarea id="text-input" class="form-textarea" placeholder="Paste your text here..."></textarea>
        <div id="reader-view" class="reader-view" hidden></div>
      </div>

      <div class="voice-row">
        <div class="form-group">
          <label class="form-label" for="lang-filter">Language</label>
          <select id="lang-filter" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="voice-select">Voice</label>
          <select id="voice-select" class="form-select"></select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Speed</label>
        <div class="speed-control">
          <span class="speed-value">0.5x</span>
          <input type="range" id="speed-control" class="speed-slider"
                 min="0.5" max="2.0" step="0.1" value="1.0">
          <span id="speed-display" class="speed-value current">1.0x</span>
          <span class="speed-value">2.0x</span>
        </div>
      </div>

      <div class="controls">
        <button id="btn-play" class="btn btn-play">&#9654; Play</button>
        <button id="btn-pause" class="btn btn-secondary" hidden>&#10074;&#10074; Pause</button>
        <button id="btn-resume" class="btn btn-primary" hidden>&#9654; Resume</button>
        <button id="btn-stop" class="btn btn-secondary" hidden>&#9632; Stop</button>
      </div>

      <div id="progress-container" class="progress-bar" hidden>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-text" class="progress-text">0 / 0</span>
      </div>
    </section>

    <!-- ===== SETTINGS VIEW ===== -->
    <section id="view-settings" class="view">
      <header class="header">
        <h1>Settings</h1>
        <button id="btn-back" class="btn-icon" title="Back" aria-label="Back">&#8592;</button>
      </header>

      <div class="settings-section">
        <div class="form-group">
          <label class="form-label" for="settings-api-key">API Key</label>
          <input type="password" id="settings-api-key" class="form-input"
                 placeholder="Google Cloud API key" autocomplete="off">
        </div>
      </div>

      <div class="settings-section">
        <div class="form-group">
          <label class="form-label" for="settings-lang">Default Language</label>
          <select id="settings-lang" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="settings-voice">Default Voice</label>
          <select id="settings-voice" class="form-select"></select>
        </div>
      </div>

      <div class="settings-section">
        <div class="form-group">
          <label class="form-label">Default Speed</label>
          <div class="speed-control">
            <span class="speed-value">0.5x</span>
            <input type="range" id="settings-speed" class="speed-slider"
                   min="0.5" max="2.0" step="0.1" value="1.0">
            <span id="settings-speed-display" class="speed-value current">1.0x</span>
            <span class="speed-value">2.0x</span>
          </div>
        </div>
      </div>

      <div class="settings-actions">
        <button id="btn-save-settings" class="btn btn-primary">Save Settings</button>
        <button id="btn-clear-settings" class="btn btn-danger">Clear All Data</button>
      </div>
    </section>

  </div>

  <audio id="audio-el" preload="none"></audio>

  <script src="./js/settings.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/chunker.js"></script>
  <script src="./js/media-session.js"></script>
  <script src="./js/player.js"></script>
  <script src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
